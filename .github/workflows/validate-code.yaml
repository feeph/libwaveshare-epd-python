---
name: verify pull request

on:
  pull_request:
  workflow_dispatch:

jobs:
  lint:
    name: lint the code
    runs-on: ubuntu-latest
    steps:
      # -------------------------------------------------------------------
      # prepare
      # -------------------------------------------------------------------
      - name: checkout repository
        uses: actions/checkout@v4
      - name: configure Python environment
        uses: actions/setup-python@v5
        with:
          python-version-file: 'pyproject.toml'
      - name: install uv
        uses: astral-sh/setup-uv@v5
      - name: identify changed files
        id: changed-files
        uses: tj-actions/changed-files@v44
        with:
          files_yaml: |
            branch:
              - "**/"
            library:
              - waveshare/**.py
            scripts:
              - examples/**.py
              - test/**.py
      # -------------------------------------------------------------------
      # validate
      # -------------------------------------------------------------------
      # The GitHub Action 'pre-commit/action' uses '--all-files' and always
      # check against all files in the repository, even if the pull request
      # does not touch them. We don't want that. Review modified files only.
      - name: re-run pre-commit hooks
        env:
          CHANGED_FILES: ${{ steps.changed-files.outputs.branch_all_changed_files }}
        run: |
          uv pip install pre-commit
          pre-commit --show-diff-on-failure --color=always --hook-stage pre-push $CHANGED_FILES
      - name: run static type checks (mypy)
        env:
          SCRIPTS: ${{ steps.changed-files.outputs.scripts_all_changed_files }}
        run: |
          # since this is a namespace package we must instruct mypy to scan
          # the code as a namespace package; it won't work if we scan files
          uv run mypy -p waveshare.canvas -p waveshare.epd
          # example scripts and tests can be scanned as files
          if [[ -n $SCRIPTS ]] ; then
            uv run mypy $SCRIPTS
          fi
      # run unit tests
